# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Web App

on:
  push:
    branches:
      - env/dev
    paths:
      - 'src/**'
      - '.github/workflows/sayyit-code-action.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: sayyit_rg1
  BASE_NAME: sayyit
  # ENV_NAME, WEBAPP_NAME and KEYVAULT_NAME are computed at runtime in the build job

# Note: This workflow uses GitHub Actions OIDC federated credentials created by
# CreateEntraApp-ServPrinc-GhFedCred.ps1. Ensure the following repository
# secrets are set to the values the script printed:
#   AZURE_CLIENT_ID      -> Application (client) ID from the app registration
#   AZURE_TENANT_ID      -> Tenant ID
#   AZURE_SUBSCRIPTION_ID-> Subscription ID
# The workflow must have permissions.id-token: write (set above) and the push
# must come from the branch configured for the federated credential e.g. refs/heads/env/dev).

jobs:
  build:
    runs-on: windows-latest 
    outputs:
      env_name: ${{ steps.set-vars.outputs.env_name }}
      webapp_name: ${{ steps.set-vars.outputs.webapp_name }}
      kv_name: ${{ steps.set-vars.outputs.kv_name }}
      kv_secret_webpublish: ${{ steps.set-vars.outputs.kv_secret_webpublish }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            Sayyit.Web/packages.lock.json
            Sayyit.Web/Sayyit.Web.Client/packages.lock.json

      - name: Restore solution
        run: dotnet restore Sayyit.Solution.sln 
      - name: Build solution
        run: dotnet build Sayyit.Solution.sln --configuration Release --no-restore
      - name: Run tests
        run: dotnet test Sayyit.Solution.sln --configuration Release --no-build 
      - name: Publish web app
        run: dotnet publish Sayyit.Web\Sayyit.Web\Sayyit.Web.csproj -c Release -o ${{ runner.temp }}/webapp --no-restore


      - name: Compute environment names
        id: set-vars
        shell: powershell
        run: |
          Write-Host "GITHUB_EVENT_NAME=$env:GITHUB_EVENT_NAME"
          Write-Host "GITHUB_REF=$env:GITHUB_REF"

          # Determine environment: use manual input if workflow_dispatch, else derive from branch
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $env_name = "${{ github.event.inputs.environment }}"
            Write-Host "Using manual trigger environment: $env_name"
          } else {
            $ref = $env:GITHUB_REF -replace '^refs/heads/',''
            if ($ref -like 'env/*') {
              $env_name = $ref -replace '^env/',''
            } else {
              $env_name = $ref
            }
            Write-Host "Using branch-derived environment: $env_name"
          }

          $webapp_name = "$($env:BASE_NAME)-$env_name-web"
          $kv_name = "$($env:BASE_NAME)-$env_name-kv"

          Write-Host ($env:BASE_NAME + "-" + $env_name + "-" + "web-publish-profile")
          $kv_secret_webpublish = $env:BASE_NAME + "-" + $env_name + "-" + "web-publish-profile"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "env_name=$env_name"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webapp_name=$webapp_name"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kv_name=$kv_name"

          # Mask the secret name so it isn't logged
          Write-Output "::add-mask::$kv_secret_webpublish"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kv_secret_webpublish=$kv_secret_webpublish"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get publish profile from Key Vault
        id: get-publish-profile
        uses: azure/powershell@v2
        env:
          KEYVAULT_NAME: ${{ steps.set-vars.outputs.kv_name }}
          KEYVAULT_SECRET_NAME: ${{ steps.set-vars.outputs.kv_secret_webpublish }}
        with:
          azPSVersion: latest
          inlineScript: |
            $publishProfile = az keyvault secret show `
              --vault-name $env:KEYVAULT_NAME `
              --name $env:KEYVAULT_SECRET_NAME `
              --query value -o tsv

            if ([string]::IsNullOrWhiteSpace($publishProfile)) {
              throw "Key Vault secret '$env:KEYVAULT_SECRET_NAME' was not found or is empty."
            }

            "publish_profile<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $publishProfile | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.build.outputs.webapp_name }}
          slot-name: 'Production'
          package: ${{ runner.temp }}/webapp 
          publish-profile: ${{ steps.get-publish-profile.outputs.publish_profile }}
