# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Web App

on:
  push:
    branches:
      - env/dev
    paths:
      - 'Sayyit.Web/**'
      - '.github/workflows/sayyit-code-action.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: sayyit_rg1
  BASE_NAME: sayyit
  # ENV_NAME, WEBAPP_NAME and KEYVAULT_NAME are computed at runtime in the build job

# Note: This workflow uses GitHub Actions OIDC federated credentials created by
# CreateEntraApp-ServPrinc-GhFedCred.ps1. Ensure the following repository
# secrets are set to the values the script printed:
#   AZURE_CLIENT_ID      -> Application (client) ID from the app registration
#   AZURE_TENANT_ID      -> Tenant ID
#   AZURE_SUBSCRIPTION_ID-> Subscription ID
# The workflow must have permissions.id-token: write (set above) and the push
# must come from the branch configured for the federated credential e.g. refs/heads/env/dev).

jobs:
  # Compute environment variables used by both web and db jobs
  compute-env:
    runs-on: windows-latest
    outputs:
      env_name: ${{ steps.set-vars.outputs.env_name }}
      webapp_name: ${{ steps.set-vars.outputs.webapp_name }}
      kv_name: ${{ steps.set-vars.outputs.kv_name }}
      kv_secret_webpublish: ${{ steps.set-vars.outputs.kv_secret_webpublish }}

    steps:
      - name: Compute environment names
        id: set-vars
        shell: powershell
        run: |
          Write-Host "GITHUB_EVENT_NAME=$env:GITHUB_EVENT_NAME"
          Write-Host "GITHUB_REF=$env:GITHUB_REF"

          # Determine environment: use manual input if workflow_dispatch, else derive from branch
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $env_name = "${{ github.event.inputs.environment }}"
            Write-Host "Using manual trigger environment: $env_name"
          } else {
            $ref = $env:GITHUB_REF -replace '^refs/heads/',''
            if ($ref -like 'env/*') {
              $env_name = $ref -replace '^env/',''
            } else {
              $env_name = $ref
            }
            Write-Host "Using branch-derived environment: $env_name"
          }

          $webapp_name = "$($env:BASE_NAME)-$env_name-web"
          $kv_name = "$($env:BASE_NAME)-$env_name-kv"
          $kv_secret_webpublish = $env:BASE_NAME + "-" + $env_name + "-" + "web-publish-profile"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "env_name=$env_name"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webapp_name=$webapp_name"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kv_name=$kv_name"

          # Mask the secret name so it isn't logged
          Write-Output "::add-mask::$kv_secret_webpublish"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kv_secret_webpublish=$kv_secret_webpublish"

  build-web:
    runs-on: windows-latest
    needs: compute-env
    outputs:
      env_name: ${{ needs.compute-env.outputs.env_name }}
      webapp_name: ${{ needs.compute-env.outputs.webapp_name }}
      kv_name: ${{ needs.compute-env.outputs.kv_name }}
      kv_secret_webpublish: ${{ needs.compute-env.outputs.kv_secret_webpublish }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            Sayyit.Web/packages.lock.json
            Sayyit.Web/Sayyit.Web.Client/packages.lock.json

      - name: Build web app
        run: dotnet build Sayyit.Web\Sayyit.Web.csproj --configuration Release 

      - name: Publish Blazor WebAssembly app
        run: dotnet publish Sayyit.Web\Sayyit.Web\Sayyit.Web.csproj -c Release -o ${{ runner.temp }}/webapp --no-build

      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sayyit-web-package
          path: ${{ runner.temp }}/webapp

  build-db:
    runs-on: windows-latest
    needs: compute-env

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build database project (DACPAC)
        run: dotnet msbuild Sayyit.Db/Sayyit.Db.sqlproj -t:Build -p:Configuration=Release

      - name: Publish (upload) DACPAC artifact
        uses: actions/upload-artifact@v4
        with:
          name: sayyit-db-dacpac
          path: Sayyit.Db/bin/Release/*.dacpac

  deploy-web:
    runs-on: windows-latest
    needs: build-web
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download web app artifact
        uses: actions/download-artifact@v4
        with:
          name: sayyit-web-package
          path: ${{ runner.temp }}/webapp

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get publish profile from Key Vault
        id: get-publish-profile
        uses: azure/powershell@v2
        env:
          KEYVAULT_NAME: ${{ needs.build-web.outputs.kv_name }}
          KEYVAULT_SECRET_NAME: ${{ needs.build-web.outputs.kv_secret_webpublish }}
        with:
          azPSVersion: latest
          inlineScript: |
            $publishProfile = az keyvault secret show `
              --vault-name $env:KEYVAULT_NAME `
              --name $env:KEYVAULT_SECRET_NAME `
              --query value -o tsv

            if ([string]::IsNullOrWhiteSpace($publishProfile)) {
              throw "Key Vault secret '$env:KEYVAULT_SECRET_NAME' was not found or is empty."
            }

            "publish_profile<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $publishProfile | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.build-web.outputs.webapp_name }}
          slot-name: 'Production'
          package: ${{ runner.temp }}/webapp 
          publish-profile: ${{ steps.get-publish-profile.outputs.publish_profile }}

  deploy-db:
    runs-on: windows-latest
    needs: [compute-env, build-db]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download DACPAC artifact
        uses: actions/download-artifact@v4
        with:
          name: sayyit-db-dacpac

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy DACPAC to Azure SQL
        shell: powershell
        env:
          ENV_NAME: ${{ needs.compute-env.outputs.env_name }}
          KV_NAME: ${{ needs.compute-env.outputs.kv_name }}
        run: |
          # Locate DACPAC
          $dacpac = Get-ChildItem -Path . -Recurse -Filter *.dacpac | Select-Object -First 1
          if (-not $dacpac) {
            Write-Error "DACPAC not found."
            exit 1
          }

          Write-Host "Found DACPAC: $($dacpac.FullName)"

          # Find sqlpackage (should be in PATH on windows-latest)
          $sqlpackage = "sqlpackage"
          try {
            & $sqlpackage /Version | Out-Null
          } catch {
            Write-Error "sqlpackage.exe not found in PATH."
            exit 1
          }

          $sqlServerName = $env:KV_NAME.Replace("-kv", "-sqlserver")
          $sqlDatabaseName = "$env:ENV_NAME-db"
          $targetServer = "$sqlServerName.database.windows.net"

          # Read SQL admin password from Key Vault (if stored)
          $sqlAdminPassword = az keyvault secret show `
            --vault-name $env:KV_NAME `
            --name "sqlServerAdministratorPassword" `
            --query value -o tsv 2>$null

          if ([string]::IsNullOrWhiteSpace($sqlAdminPassword)) {
            Write-Warning "SQL admin password not found in Key Vault. Skipping DACPAC deployment."
            exit 0
          }

          # Deploy the DACPAC
          & $sqlpackage /Action:Publish `
            /SourceFile:$($dacpac.FullName) `
            /TargetServerName:$targetServer `
            /TargetDatabaseName:$sqlDatabaseName `
            /TargetUser:"sqladminuser" `
            /TargetPassword:$sqlAdminPassword `
            /p:BlockOnPossibleDataLoss=false `
            /p:TrustServerCertificate=true

          if ($LASTEXITCODE -eq 0) {
            Write-Host "DACPAC deployment succeeded."
          } else {
            Write-Error "DACPAC deployment failed with exit code $LASTEXITCODE."
            exit $LASTEXITCODE
          }

