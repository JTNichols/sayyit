# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - sayyit-dev-web

on:
  push:
    branches:
      - env/dev
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: sayyit_rg1
  BASE_NAME: sayyit
  # ENV_NAME, WEBAPP_NAME and KEYVAULT_NAME are computed at runtime in the build job

# Note: This workflow uses GitHub Actions OIDC federated credentials created by
# CreateEntraApp-ServPrinc-GhFedCred.ps1. Ensure the following repository
# secrets are set to the values the script printed:
#   AZURE_CLIENT_ID      -> Application (client) ID from the app registration
#   AZURE_TENANT_ID      -> Tenant ID
#   AZURE_SUBSCRIPTION_ID-> Subscription ID
# The workflow must have permissions.id-token: write (set above) and the push
# must come from the branch configured for the federated credential
# (refs/heads/env/dev).

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout
    outputs:
      env_name: ${{ steps.set-vars.outputs.env_name }}
      webapp_name: ${{ steps.set-vars.outputs.webapp_name }}
      kv_name: ${{ steps.set-vars.outputs.kv_name }}
      kv_secret_name: ${{ steps.set-vars.outputs.kv_secret_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute environment names
        id: set-vars
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          ref=${GITHUB_REF#refs/heads/}
          if [[ "$ref" == env/* ]]; then
            env_name=${ref#env/}
          else
            env_name=$ref
          fi

          webapp_name="${BASE_NAME}-${env_name}-web"
          kv_name="${BASE_NAME}-${env_name}-kv"
          kv_secret_name="${BASE_NAME}-${env_name}-web-publish-profile"

          echo "env_name=$env_name" >> $GITHUB_OUTPUT
          echo "webapp_name=$webapp_name" >> $GITHUB_OUTPUT
          echo "kv_name=$kv_name" >> $GITHUB_OUTPUT
          echo "kv_secret_name=$kv_secret_name" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

      - name: Build database project (DACPAC)
        run: |
          echo Building Sayyit.Db SQL project
          dotnet msbuild "Sayyit.Db/Sayyit.Db.sqlproj" -t:Build -p:Configuration=Release

      - name: Upload DB DACPAC artifact
        uses: actions/upload-artifact@v4
        with:
          name: sayyit-db-dacpac
          path: Sayyit.Db\bin\Release\*.dacpac

  deploy:
    runs-on: windows-latest
    needs: build

    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Download DB DACPAC artifact
        uses: actions/download-artifact@v4
        with:
          name: sayyit-db-dacpac

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get publish profile from Key Vault
        id: get-publish-profile
        uses: azure/powershell@v2
        env:
          KEYVAULT_NAME: ${{ needs.build.outputs.kv_name }}
          KEYVAULT_SECRET_NAME: ${{ needs.build.outputs.kv_secret_name }}
        with:
          azPSVersion: latest
          inlineScript: |
            $publishProfile = az keyvault secret show `
              --vault-name $env:KEYVAULT_NAME `
              --name $env:KEYVAULT_SECRET_NAME `
              --query value -o tsv

            if ([string]::IsNullOrWhiteSpace($publishProfile)) {
              throw "Key Vault secret '$env:KEYVAULT_SECRET_NAME' was not found or is empty."
            }

            "publish_profile<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $publishProfile | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.build.outputs.webapp_name }}
          slot-name: 'Production'
          package: .
          publish-profile: ${{ steps.get-publish-profile.outputs.publish_profile }}
