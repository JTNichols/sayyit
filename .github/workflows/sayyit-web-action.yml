name: Deploy Sayyit.Web (Blazor WASM) to Azure Web App

on:
  push:
    branches: [env/dev]
    paths:
      - 'Sayyit.Web/**'
      - '.github/workflows/sayyit-web-action.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
   
env:
  RESOURCE_GROUP: sayyit_rg1
  ENV_NAME: dev
  BASE_NAME: sayyit
  WEBAPP_NAME: sayyit-dev-web
  KEYVAULT_NAME: sayyit-dev-kv
  KEYVAULT_SECRET_NAME: sayyit-dev-web-publish-profile
  WORKING_DIRECTORY: Sayyit.Web/Sayyit.Web.csproj
  CONFIGURATION: Release
  AZURE_WEBAPP_PACKAGE_PATH: myapp
  AZURE_WEBAPP_NAME: sayyit-dev-web

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore
        run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
      - name: Build
        run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
      - name: Publish
        run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "$env:RUNNER_TEMP\${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
      # - name: Publish
      #   shell: pwsh
      #   run: dotnet publish Sayyit.Web\Sayyit.Web.csproj -c Release -o "$env:RUNNER_TEMP\myapp"

      # - name: Verify publish output
      #   shell: pwsh
      #   run: |
      #     if (-not (Test-Path "$env:RUNNER_TEMP\myapp\web.config")) { throw "Missing web.config" }
      #     if (-not (Test-Path "$env:RUNNER_TEMP\myapp\wwwroot\index.html")) { throw "Missing index.html" }
      #     if ((Get-ChildItem "$env:RUNNER_TEMP\myapp\wwwroot\_framework" -Filter *.wasm -File).Count -lt 1) { throw "No wasm files" }
      #     if (Test-Path "$env:RUNNER_TEMP\myapp\wwwroot\web.config") { throw "Stray web.config inside wwwroot" }
      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ runner.temp }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: .net-app
      #     path: ${{ runner.temp }}/myapp

      - name: Verify publish output
        shell: pwsh
        run: |
          $publish = "$env:RUNNER_TEMP\${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"

          if (-not (Test-Path "$publish\web.config")) {
            throw "Missing web.config"
          }

          if (-not (Test-Path "$publish\wwwroot\index.html")) {
            throw "Missing wwwroot\index.html"
          }

          if ((Get-ChildItem "$publish\wwwroot\_framework" -Filter *.wasm -File).Count -lt 1) {
            throw "No WebAssembly files in wwwroot\_framework"
          }

          if (Test-Path "$publish\wwwroot\web.config") {
            throw "Stray web.config inside wwwroot"
          }

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp # was .net-app
          path: ${{ runner.temp }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          #path: ${{ runner.temp }}/site


      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get publish profile from Key Vault
        id: get-publish-profile
        uses: azure/powershell@v2
        with:
          azPSVersion: latest
          inlineScript: |
            $publishProfile = az keyvault secret show `
              --vault-name "${{ env.KEYVAULT_NAME }}" `
              --name "${{ env.KEYVAULT_SECRET_NAME }}" `
              --query value -o tsv
            if ([string]::IsNullOrWhiteSpace($publishProfile)) {
              throw "Key Vault secret '${{ env.KEYVAULT_SECRET_NAME }}' was not found or is empty."
            }
            "publish_profile<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $publishProfile | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Debug publish profile metadata (safe)
        shell: pwsh
        run: |
          $profile = @"
          ${{ steps.get-publish-profile.outputs.publish_profile }}
          "@
          if ([string]::IsNullOrWhiteSpace($profile)) {
            throw "Publish profile output is empty."
          }
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($profile)
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          $hash = [System.BitConverter]::ToString($sha256.ComputeHash($bytes)).Replace('-', '').ToLowerInvariant()
          Write-Host "publish-profile length: $($profile.Length)"
          Write-Host "publish-profile sha256: $hash"
            
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ runner.temp }}/${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          publish-profile: ${{ steps.get-publish-profile.outputs.publish_profile }}
      
       
             