name: Build and deploy Sayyit.Web to Azure

on:
  push:
    branches:
      - 'env/*'
    paths:
      - 'Sayyit.Web/**'
      - '.github/workflows/sayyit-web-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BASE_NAME: sayyit
  RESOURCE_GROUP: sayyit_rg1

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true

      - name: Restore solution
        run: dotnet restore Sayyit.Solution.sln

      - name: Build Sayyit.Web
        run: dotnet build Sayyit.Web\Sayyit.Web\Sayyit.Web.csproj --configuration Release --no-restore

      - name: Publish Sayyit.Web
        run: dotnet publish Sayyit.Web\Sayyit.Web\Sayyit.Web.csproj -c Release -o ${{ runner.temp }}/webapp --no-build

      - name: Compute environment names
        id: set-vars
        shell: powershell
        run: |
          $ref = $env:GITHUB_REF -replace '^refs/heads/',''
          if ($ref -like 'env/*') { $envName = $ref -replace '^env/','' } else { $envName = $ref }
          $webapp = "$($env:BASE_NAME)-$envName-web"
          $kv = "$($env:BASE_NAME)-$envName-kv"
          $kvSecret = "$($env:BASE_NAME)-$envName-web-publish-profile"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "env_name=$envName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "webapp_name=$webapp"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kv_name=$kv"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kv_secret_name=$kvSecret"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get publish profile from Key Vault
        id: get-publish-profile
        uses: azure/powershell@v2
        env:
          KEYVAULT_NAME: ${{ steps.set-vars.outputs.kv_name }}
          KEYVAULT_SECRET_NAME: ${{ steps.set-vars.outputs.kv_secret_name }}
        with:
          azPSVersion: latest
          inlineScript: |
            $publishProfile = az keyvault secret show 
              --vault-name $env:KEYVAULT_NAME 
              --name $env:KEYVAULT_SECRET_NAME 
              --query value -o tsv

            if ([string]::IsNullOrWhiteSpace($publishProfile)) {
              throw "Key Vault secret '$env:KEYVAULT_SECRET_NAME' was not found or is empty."
            }

            "publish_profile<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $publishProfile | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.set-vars.outputs.webapp_name }}
          slot-name: 'Production'
          package: ${{ runner.temp }}/webapp
          publish-profile: ${{ steps.get-publish-profile.outputs.publish_profile }}
