name: Sayyit.Db


on:
  push:
    branches:
      - env/dev
    paths:
      - 'Sayyit.Db/**'
      - '.github/workflows/sayyit-db-action.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: false
        default: dev
        type: choice
        options:
          - dev

permissions:
  id-token: write
  contents: read

env:
  RESOURCEGROUP: sayyit_rg1
  BASENAME: sayyit

jobs:
  build:
    runs-on: windows-latest
    outputs:
      envname: ${{ steps.set-vars.outputs.envname }}
      kvname: ${{ steps.set-vars.outputs.kvname }}
      sqlservername: ${{ steps.set-vars.outputs.sqlservername }}
      sqldatabasename: ${{ steps.set-vars.outputs.sqldatabasename }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build SQL project
        shell: pwsh
        run: |
          msbuild Sayyit.Db/Sayyit.Db.sqlproj `
            /t:Build `
            /p:Configuration=Release

      - name: Verify DACPAC output
        shell: pwsh
        run: |
          $dacpac = Get-ChildItem -Path Sayyit.Db/bin/Release -Recurse -Filter *.dacpac | Select-Object -First 1
          if (-not $dacpac) {
            throw "No DACPAC was produced under Sayyit.Db/bin/Release."
          }
          Write-Host "DACPAC found: $($dacpac.FullName)"

      - name: Upload DACPAC artifact
        uses: actions/upload-artifact@v4
        with:
          name: sayyit-db-dacpac
          path: Sayyit.Db/bin/Release/**/*.dacpac
          if-no-files-found: error

      - name: Compute environment names
        id: set-vars
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $envName = '${{ github.event.inputs.environment }}'
          }
          else {
            $ref = '${{ github.ref }}'
            if ($ref -like 'refs/heads/env/*') {
              $envName = $ref -replace '^refs/heads/env/', ''
            }
            else {
              throw "Unsupported branch name: $ref"
            }
          }

          $kvName = "${env:BASENAME}-$envName-kv"
          $sqlServerName = "${env:BASENAME}-$envName-sqlServer"
          $sqlDatabaseName = "${env:BASENAME}-$envName-db"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "envname=$envName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kvname=$kvName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sqlservername=$sqlServerName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sqldatabasename=$sqlDatabaseName"

  deploy-db:
    runs-on: windows-latest
    needs: build
    environment: ${{ needs.build.outputs.envname }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DACPAC artifact
        uses: actions/download-artifact@v4
        with:
          name: sayyit-db-dacpac
          path: ./artifacts

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SQL secrets from Key Vault
        id: get-sql-secrets
        uses: azure/powershell@v2
        env:
          KEYVAULT_NAME: ${{ needs.build.outputs.kvname }}
        with:
          azPSVersion: latest
          inlineScript: |
            $sqlAdminUser = az keyvault secret show `
              --vault-name $env:KEYVAULT_NAME `
              --name sqlServerAdminLoginName `
              --query value -o tsv 2>$null

            if ([string]::IsNullOrWhiteSpace($sqlAdminUser)) {
              $sqlAdminUser = 'sqladminuser'
            }

            $sqlAdminPassword = az keyvault secret show `
              --vault-name $env:KEYVAULT_NAME `
              --name sqlServerAdministratorPassword `
              --query value -o tsv

            if ([string]::IsNullOrWhiteSpace($sqlAdminPassword)) {
              throw "Key Vault secret sqlServerAdministratorPassword was not found or is empty."
            }

            "sqladminuser=$sqlAdminUser" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "sqladminpassword=$sqlAdminPassword" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Locate DACPAC
        id: find-dacpac
        shell: pwsh
        run: |
          $dacpac = Get-ChildItem -Path ./artifacts -Recurse -Filter *.dacpac | Select-Object -First 1
          if (-not $dacpac) {
            throw "DACPAC not found in downloaded artifact."
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$($dacpac.FullName)"

      - name: Deploy DACPAC
        uses: azure/sql-action@v2.3
        with:
          connection-string: >-
            Server=tcp:${{ needs.build.outputs.sqlservername }}.database.windows.net,1433;
            Initial Catalog=${{ needs.build.outputs.sqldatabasename }};
            Persist Security Info=False;
            User ID=${{ steps.get-sql-secrets.outputs.sqladminuser }};
            Password=${{ steps.get-sql-secrets.outputs.sqladminpassword }};
            MultipleActiveResultSets=False;
            Encrypt=True;
            TrustServerCertificate=False;
            Connection Timeout=30;
          path: ${{ steps.find-dacpac.outputs.path }}
          action: publish
          arguments: >-
            /p:BlockOnPossibleDataLoss=false
            /p:DropObjectsNotInSource=false